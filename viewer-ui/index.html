<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamGate — Pay-Per-Second Streaming</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier New', monospace;
    background: #0a0a0f;
    color: #e0e0ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #12121e;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 40px rgba(100,80,255,0.15);
  }
  .logo { font-size: 10px; letter-spacing: 4px; color: #6060aa; text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 20px; color: #a0a0ff; margin-bottom: 4px; }
  .subtitle { font-size: 11px; color: #4a4a7a; margin-bottom: 16px; }
  .steps {
    background: #0d0d1a;
    border: 1px solid #1e1e3a;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 22px;
    font-size: 11px;
    color: #5a5a8a;
    line-height: 2;
  }
  .steps span { color: #7070bb; }
  .section { margin-bottom: 18px; }
  label { display: block; font-size: 10px; letter-spacing: 2px; color: #6060aa; text-transform: uppercase; margin-bottom: 8px; }
  input[type="text"] {
    width: 100%; padding: 10px 14px;
    background: #0a0a18; border: 1px solid #2a2a4a;
    border-radius: 6px; color: #c0c0ff;
    font-family: monospace; font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #5050cc; }
  .rate-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .rate-btn {
    flex: 1; min-width: 70px; padding: 8px 4px;
    background: #0a0a18; border: 1px solid #2a2a4a;
    border-radius: 6px; color: #8080cc;
    font-family: monospace; font-size: 11px;
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .rate-btn:hover { border-color: #5050cc; color: #a0a0ff; }
  .rate-btn.selected { border-color: #7070ff; background: #1a1a3a; color: #c0c0ff; }
  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 8px;
    font-family: monospace; font-size: 14px;
    cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
  }
  .btn-primary { background: linear-gradient(135deg, #4040cc, #6030aa); color: #fff; }
  .btn-primary:hover { background: linear-gradient(135deg, #5050dd, #7040bb); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  #msg { font-size: 11px; color: #6060aa; text-align: center; min-height: 16px; margin-top: 10px; }
  #msg.error { color: #ff6060; }
  .footer { margin-top: 20px; text-align: center; font-size: 10px; color: #3a3a5a; line-height: 1.6; }
  .footer a { color: #4a4a7a; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">StreamGate</div>
  <h1>Pay-per-second</h1>
  <p class="subtitle">Watch live. Pay only for what you watch.</p>

  <div class="steps">
    <span>①</span> Enter wallet + pick rate<br>
    <span>②</span> Click Watch — stream opens here<br>
    <span>③</span> Join the chat on the stream<br>
    <span>④</span> USDC settles when you leave
  </div>

  <div class="section">
    <label>Your wallet address</label>
    <input type="text" id="walletInput" placeholder="0x…" maxlength="42" />
  </div>

  <div class="section">
    <label>Spending rate</label>
    <div class="rate-options">
      <button class="rate-btn" data-rate="0.0001">$0.0001<br><small>/sec</small></button>
      <button class="rate-btn selected" data-rate="0.001">$0.001<br><small>/sec</small></button>
      <button class="rate-btn" data-rate="0.005">$0.005<br><small>/sec</small></button>
      <button class="rate-btn" data-rate="0.01">$0.01<br><small>/sec</small></button>
    </div>
  </div>

  <button class="btn btn-primary" id="watchBtn" onclick="startWatching()">
    ▶ Watch Live Stream
  </button>
  <div id="msg"></div>

  <div class="footer">
    <a href="https://github.com/0xUstaz/streamgate" target="_blank">github.com/0xUstaz/streamgate</a>
    · Arc Testnet · USDC
  </div>
</div>

<script>
  let selectedRate = 0.001;

  document.querySelectorAll('.rate-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.rate-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedRate = parseFloat(btn.dataset.rate);
    });
  });

  function startWatching() {
    const wallet = document.getElementById('walletInput').value.trim();
    if (!wallet.startsWith('0x') || wallet.length !== 42) {
      setMsg('⚠ Enter a valid 0x wallet address', 'error'); return;
    }
    // Redirect to /watch with wallet and rate as params
    window.location.href = `/watch?wallet=${encodeURIComponent(wallet)}&rate=${selectedRate}`;
  }

  function setMsg(t, type = '') {
    const el = document.getElementById('msg');
    el.textContent = t; el.className = type;
  }
</script>
</body>
</html>
